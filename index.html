<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OssiScan · 骨折智能识别</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06090f;--film:#000;--panel:#0d131d;--panel-2:#121b27;
    --line:#1d2a3a;--line-soft:#16212f;--txt:#e7eef6;--txt-2:#9fb0c2;--muted:#64768a;
    --accent:#35e5d0;--accent-dim:#1c6b63;
    --red:#ff3b46;--red-deep:#e11d2a;--red-soft:#1c0a0d;--red-bd:#5a232b;
    --low:#4ade80;--mod:#fbbf24;--high:#ff3b46;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --disp:"Space Grotesk",system-ui,sans-serif;
    --body:"Inter","Noto Sans KR",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:radial-gradient(1100px 560px at 78% -12%,#0c1826,transparent 60%),var(--bg);
    color:var(--txt);font-family:var(--body);-webkit-font-smoothing:antialiased;min-height:100vh}

  header{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0b121b,#080d15);position:sticky;top:0;z-index:30;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--disp)}
  .logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--accent),#138f84);box-shadow:0 0 0 1px #2ee0cb55,0 6px 18px -6px #35e5d0aa}
  .logo svg{width:20px;height:20px}
  .brand b{font-size:18px;letter-spacing:.3px}.brand b span{color:var(--accent)}
  .brand small{display:block;font-size:10.5px;letter-spacing:2.4px;color:var(--muted);font-family:var(--mono);text-transform:uppercase}
  .spacer{flex:1}
  .lang{display:flex;gap:3px;background:#0c1521;border:1px solid var(--line-soft);border-radius:9px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--txt-2);font-family:var(--mono);font-size:12px;font-weight:500;
    padding:6px 11px;border-radius:6px;cursor:pointer;transition:.15s}
  .lang button:hover{color:var(--txt)}
  .lang button.on{background:var(--accent);color:#04231f;font-weight:600}
  .pill{font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);
    color:var(--txt-2);display:flex;align-items:center;gap:7px;background:#0a121b}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .dot.idle{background:var(--muted);box-shadow:none}
  .dot.busy{background:var(--mod);box-shadow:0 0 8px var(--mod)}

  .wrap{max-width:980px;margin:0 auto;padding:26px 22px 60px}
  .step-lead{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin:0 0 8px}
  .h-title{font-family:var(--disp);font-size:24px;font-weight:700;margin:0 0 6px;line-height:1.2}
  .h-sub{color:var(--txt-2);font-size:13.5px;margin:0 0 20px;line-height:1.6}

  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .tgroup{display:flex;gap:4px;background:#0c1521;border:1px solid var(--line-soft);border-radius:10px;padding:4px}
  .tbtn{border:0;background:transparent;color:var(--txt-2);font-family:var(--body);font-size:13px;font-weight:500;
    padding:7px 12px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.16s}
  .tbtn svg{width:15px;height:15px;flex:none}
  .tbtn:hover{color:var(--txt)}
  .tbtn.on{background:var(--accent);color:#04231f;font-weight:600}
  .tbtn.ghost{border:1px solid var(--line);background:#0c1521}
  .tbtn.ghost:hover{border-color:var(--accent-dim);color:var(--txt)}
  .tbtn:disabled{opacity:.4;cursor:not-allowed}
  .slider{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .slider input{width:74px;accent-color:var(--accent);cursor:pointer}
  .slider b{color:var(--txt-2);min-width:34px;text-align:right}

  .stage{position:relative;width:100%;aspect-ratio:4/3;max-height:72vh;background:var(--film);border-radius:10px;overflow:hidden;
    box-shadow:0 0 0 1px #1c2a3a,0 30px 80px -34px #000;user-select:none;touch-action:none;margin:0 auto}
  .stage.ready{cursor:crosshair}
  .imglayer{position:absolute;inset:0;transition:filter .12s}
  .imglayer img,.imglayer svg{width:100%;height:100%;object-fit:contain;display:block}
  .imglayer.empty{display:none}

  .drop{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    text-align:center;color:var(--muted);cursor:pointer;background:repeating-linear-gradient(0deg,#070b11 0 2px,#06090f 2px 4px)}
  .drop.hide{display:none}
  .drop.drag{background:#06181a;color:var(--accent)}
  .drop .ic{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;border:1.5px dashed #2a3a4d;color:#42566b;margin-bottom:6px;transition:.2s}
  .drop.drag .ic{border-color:var(--accent);color:var(--accent);transform:scale(1.05)}
  .drop .ic svg{width:26px;height:26px}
  .drop .big{font-family:var(--disp);font-size:17px;font-weight:600;color:var(--txt)}
  .drop .small{font-size:12.5px;padding:0 20px}
  .drop .demo{margin-top:10px;font-family:var(--mono);font-size:11.5px;color:var(--accent);text-decoration:underline;text-underline-offset:3px}

  .heat{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .35s;mix-blend-mode:screen}
  .heat.show{opacity:.75}
  .grid-fx{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s;
    background-image:linear-gradient(#35e5d010 1px,transparent 1px),linear-gradient(90deg,#35e5d010 1px,transparent 1px);background-size:28px 28px}
  .stage.scanning .grid-fx{opacity:1}
  .sweep{position:absolute;left:0;right:0;height:110px;pointer-events:none;opacity:0;
    background:linear-gradient(180deg,transparent,#35e5d022 60%,#35e5d0cc);border-bottom:1.5px solid var(--accent);box-shadow:0 0 26px 4px #35e5d055}
  .stage.scanning .sweep{opacity:1;animation:sweep 1.4s cubic-bezier(.4,0,.2,1) infinite}
  @keyframes sweep{0%{top:-110px}100%{top:100%}}

  .region{position:absolute;opacity:0;transition:opacity .25s;pointer-events:none}
  .region.show{opacity:1}
  .rbox{position:absolute;inset:0;border:2.5px solid var(--red);border-radius:2px;
    box-shadow:0 0 0 1px #00000088,0 0 22px -2px var(--red);outline:9999px solid rgba(4,6,10,0);transition:outline-color .4s}
  .rbox.circle{border-radius:50%}
  .region.focus .rbox{outline-color:rgba(4,6,10,.74)}
  .region.locked .rbox{animation:rpulse 2s ease-in-out infinite}
  @keyframes rpulse{0%,100%{box-shadow:0 0 0 1px #00000088,0 0 13px -2px var(--red)}50%{box-shadow:0 0 0 1px #00000088,0 0 26px 2px var(--red)}}
  .rtick{position:absolute;width:10px;height:10px;border:2.5px solid var(--red)}
  .rtick.tl{top:-2.5px;left:-2.5px;border-right:0;border-bottom:0}.rtick.tr{top:-2.5px;right:-2.5px;border-left:0;border-bottom:0}
  .rtick.bl{bottom:-2.5px;left:-2.5px;border-right:0;border-top:0}.rtick.br{bottom:-2.5px;right:-2.5px;border-left:0;border-top:0}
  .rlabel{position:absolute;top:-25px;left:0;font-family:var(--mono);font-size:11.5px;font-weight:600;color:#fff;
    background:var(--red-deep);padding:2px 9px;border-radius:4px;white-space:nowrap;box-shadow:0 4px 12px -4px #000}
  .rconf{position:absolute;bottom:-23px;right:0;font-family:var(--mono);font-size:10.5px;color:var(--red);
    background:var(--red-soft);border:1px solid var(--red-bd);padding:1px 8px;border-radius:4px}

  .hud{position:absolute;left:12px;bottom:11px;font-family:var(--mono);font-size:10px;color:#35e5d0aa;line-height:1.7;pointer-events:none;text-shadow:0 1px 3px #000;z-index:6}
  .hud .k{color:#4a5d70}
  .hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:11.5px;color:var(--txt);
    background:#0a1019cc;border:1px solid var(--line);padding:6px 14px;border-radius:8px;backdrop-filter:blur(4px);
    opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;z-index:7;max-width:90%}
  .hint.show{opacity:1}

  .actbar{display:flex;gap:11px;margin:16px 0 4px}
  .btn{border:0;border-radius:11px;padding:14px 18px;font-family:var(--body);font-size:14px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:9px;transition:.16s}
  .btn svg{width:17px;height:17px}
  .btn.primary{flex:1;background:linear-gradient(150deg,var(--accent),#15a094);color:#042220;box-shadow:0 10px 26px -12px var(--accent)}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.primary:disabled{background:#16222e;color:#4a5d70;box-shadow:none;cursor:not-allowed}
  .btn.sec{background:#101a26;color:var(--txt-2);border:1px solid var(--line)}
  .btn.sec:hover{color:var(--txt);border-color:var(--accent-dim)}

  .results{margin-top:30px;opacity:0;transform:translateY(10px);transition:.45s;pointer-events:none}
  .results.show{opacity:1;transform:none;pointer-events:auto}
  .res-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .res-head h2{font-family:var(--disp);font-size:18px;font-weight:600;margin:0;display:flex;align-items:center;gap:9px}
  .res-head h2 .ic{color:var(--red)}
  .res-head .ts{font-family:var(--mono);font-size:11px;color:var(--muted)}

  .card{background:linear-gradient(180deg,var(--panel),#0a0f17);border:1px solid var(--line-soft);border-radius:16px;overflow:hidden}
  .verdict{display:flex;gap:22px;align-items:center;padding:22px 24px;border-bottom:1px solid var(--line-soft)}
  .ring{position:relative;width:120px;height:120px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .val{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .ring .val b{font-family:var(--disp);font-size:30px;font-weight:700;line-height:1}
  .ring .val small{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;display:block;margin-top:4px}
  .v-text{min-width:0;flex:1}
  .v-text .lab{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  .v-text .cls{font-family:var(--disp);font-size:26px;font-weight:700;margin:5px 0 2px;line-height:1.15;color:var(--red)}
  .v-text .en{font-family:var(--mono);font-size:13px;color:var(--txt-2)}
  .sev{display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:6px 13px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid}
  .sev .d{width:8px;height:8px;border-radius:50%}

  .res-grid{display:grid;grid-template-columns:1fr 1fr}
  @media(max-width:760px){.res-grid{grid-template-columns:1fr}.verdict{flex-direction:column;text-align:center}}
  .block{padding:20px 24px;border-bottom:1px solid var(--line-soft);border-right:1px solid var(--line-soft)}
  .res-grid .block:nth-child(2n){border-right:0}
  .block h3{margin:0 0 14px;font-family:var(--mono);font-size:11px;letter-spacing:1.6px;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .block h3::after{content:"";flex:1;height:1px;background:var(--line-soft)}

  .prob{margin-bottom:12px}.prob:last-child{margin-bottom:0}
  .prob-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;gap:8px}
  .prob-top .nm{color:var(--txt);font-weight:500}
  .prob-top .pc{font-family:var(--mono);color:var(--txt-2);font-size:12px;flex:none}
  .bar{height:7px;background:#0a121b;border-radius:6px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:6px;width:0;transition:width .9s cubic-bezier(.2,.7,.2,1);background:linear-gradient(90deg,#2c8079,var(--accent))}
  .prob.lead .nm{color:var(--red)}.prob.lead i{background:linear-gradient(90deg,var(--red-deep),var(--red))}

  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .stat{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:11px;padding:12px 13px}
  .stat .k{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
  .stat .v{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--txt);margin-top:5px}
  .stat .v small{font-size:11px;color:var(--txt-2);font-weight:400}

  .finding{font-size:13.5px;line-height:1.75;color:var(--txt-2);margin:0}
  .finding b{color:var(--txt);font-weight:600}
  .reco{margin:0;padding:0;list-style:none}
  .reco li{position:relative;padding:8px 0 8px 22px;font-size:13px;line-height:1.55;color:var(--txt-2);border-top:1px solid var(--line-soft)}
  .reco li:first-child{border-top:0}
  .reco li::before{content:"";position:absolute;left:3px;top:14px;width:7px;height:7px;border-radius:50%;background:var(--accent)}

  .res-foot{padding:18px 24px}
  .disclaimer{margin:14px 0 0;font-size:11.5px;line-height:1.6;color:var(--muted);
    background:#0c121b;border:1px solid var(--line-soft);border-left:3px solid var(--mod);border-radius:9px;padding:12px 14px}
  .disclaimer b{color:var(--txt-2)}
  .hidden{display:none!important}
  #fileInput{display:none}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#042220" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3a2 2 0 0 0-2 2 2 2 0 0 0-1 3l2 2v4l-2 2a2 2 0 0 0 1 3 2 2 0 0 0 2 2 2 2 0 0 0 3-1 2 2 0 0 0 3 1 2 2 0 0 0 2-2 2 2 0 0 0 1-3l-2-2v-4l2-2a2 2 0 0 0-1-3 2 2 0 0 0-2-2 2 2 0 0 0-3 1 2 2 0 0 0-3-1Z"/></svg></span>
    <b>Ossi<span>Scan</span><small>fracture intelligence</small></b>
  </div>
  <div class="spacer"></div>
  <div class="lang" id="lang">
    <button data-lang="zh" class="on">中</button>
    <button data-lang="en">EN</button>
    <button data-lang="ko">한</button>
  </div>
  <div class="pill"><span class="dot idle" id="statusDot"></span><span id="statusTxt">等待上传</span></div>
</header>

<div class="wrap">
  <p class="step-lead" data-i18n="lead">步骤 01 · 自动检测</p>
  <h1 class="h-title" data-i18n="title">上传 X 光影像，自动框选骨折部位</h1>
  <p class="h-sub" data-i18n-html="subtitle"></p>

  <div class="toolbar">
    <div class="tgroup">
      <button class="tbtn on" id="modeBox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="1"/></svg><span data-i18n="tb_box">方框</span></button>
      <button class="tbtn" id="modeCircle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg><span data-i18n="tb_circle">圆形</span></button>
    </div>
    <button class="tbtn ghost" id="heatBtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12c2-5 4-7 6-2s4 9 6 2 3-4 6 0"/></svg><span data-i18n="tb_heat">热力图</span></button>
    <div class="slider"><span data-i18n="tb_bright">亮度</span><input type="range" id="brightness" min="60" max="160" value="100"><b id="brVal">100%</b></div>
    <div class="slider"><span data-i18n="tb_contrast">对比</span><input type="range" id="contrast" min="70" max="220" value="110"><b id="ctVal">110%</b></div>
    <div class="spacer"></div>
    <button class="tbtn ghost" id="uploadBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0 4 4m-4-4-4 4"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg><span data-i18n="tb_upload">上传影像</span></button>
    <input type="file" id="fileInput" accept="image/*">
    <button class="tbtn ghost" id="clearBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg><span data-i18n="tb_reset">重置</span></button>
  </div>

  <div class="stage" id="stage">
    <div class="imglayer empty" id="imgLayer"></div>
    <div class="drop" id="drop">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0 4 4m-4-4-4 4"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg></span>
      <span class="big" data-i18n="drop_big">点击或拖拽上传 X 光影像</span>
      <span class="small" data-i18n="drop_small">支持 JPG / PNG · 上传后自动框选骨折部位</span>
      <span class="demo" id="loadDemo" data-i18n="drop_demo">没有图片？载入示例影像</span>
    </div>
    <svg class="heat" id="heatLayer" viewBox="0 0 600 800" preserveAspectRatio="none">
      <defs><radialGradient id="cam" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ff2d2d" stop-opacity="1"/><stop offset="30%" stop-color="#ff8a00" stop-opacity=".9"/>
        <stop offset="58%" stop-color="#ffe600" stop-opacity=".5"/><stop offset="80%" stop-color="#2bff6a" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#0044ff" stop-opacity="0"/></radialGradient></defs>
      <ellipse id="camBlob" cx="300" cy="400" rx="120" ry="100" fill="url(#cam)"/>
    </svg>
    <div class="grid-fx"></div>
    <div class="sweep"></div>
    <div class="region" id="region">
      <div class="rbox" id="rbox"><span class="rtick tl"></span><span class="rtick tr"></span><span class="rtick bl"></span><span class="rtick br"></span></div>
      <span class="rlabel hidden" id="rlabel"></span>
      <span class="rconf hidden" id="rconf"></span>
    </div>
    <div class="hud hidden" id="hud"><span class="k">ROI</span> <span id="hudRoi">—</span></div>
    <div class="hint" id="hint"></div>
  </div>

  <div class="actbar">
    <button class="btn primary" id="scanBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M3 12h18"/></svg>
      <span id="scanLbl" data-i18n="btn_auto">自动检测并分析</span>
    </button>
  </div>

  <section class="results" id="results">
    <div class="res-head">
      <h2><span class="ic">▣</span> <span data-i18n="res_title">分析结果</span></h2>
      <span class="ts" id="reportTs">—</span>
    </div>
    <div class="card">
      <div class="verdict">
        <div class="ring">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="51" fill="none" stroke="#101a26" stroke-width="9"/>
            <circle id="ringArc" cx="60" cy="60" r="51" fill="none" stroke="var(--red)" stroke-width="9" stroke-linecap="round" stroke-dasharray="320" stroke-dashoffset="320"/>
          </svg>
          <div class="val"><b id="confBig">0%</b><small data-i18n="conf_lab">置信度</small></div>
        </div>
        <div class="v-text">
          <div class="lab" data-i18n="verdict_lab">检测区诊断</div>
          <div class="cls" id="clsName">—</div>
          <div class="en" id="clsEn">—</div>
          <span class="sev" id="sevBadge"><span class="d"></span><span id="sevTxt">—</span></span>
        </div>
      </div>
      <div class="res-grid">
        <div class="block"><h3 data-i18n="prob_title">类别概率分布</h3><div id="probList"></div></div>
        <div class="block"><h3 data-i18n="measure_title">区域测量</h3>
          <div class="mgrid">
            <div class="stat"><div class="k" data-i18n="m_coord">检测坐标</div><div class="v" id="mCoord">—</div></div>

  /* ---------------- auto-detect (image-based heuristic) ---------------- */
  function autoDetect(){
    try{
      const el=img.querySelector('img'); if(!el||!el.naturalWidth) return null;
      const nw=el.naturalWidth, nh=el.naturalHeight;
      const cw=140, ch=Math.max(40,Math.round(140*nh/nw));
      const c=document.createElement('canvas'); c.width=cw;c.height=ch;
      const x=c.getContext('2d',{willReadFrequently:true}); x.drawImage(el,0,0,cw,ch);
      const d=x.getImageData(0,0,cw,ch).data;
      const gray=new Float32Array(cw*ch); let mean=0,mx=0;
      for(let i=0;i<cw*ch;i++){const v=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];gray[i]=v;mean+=v;if(v>mx)mx=v;}
      mean/=cw*ch;
      const grad=new Float32Array(cw*ch);
      for(let y=1;y<ch-1;y++)for(let xx=1;xx<cw-1;xx++){const i=y*cw+xx;
        grad[i]=Math.abs(gray[i+1]-gray[i-1])+Math.abs(gray[i+cw]-gray[i-cw]);}
      const thr=Math.max(mean*0.7,mx*0.35);
      const winW=Math.max(8,Math.round(cw*0.22)), winH=Math.max(8,Math.round(ch*0.22));
      const step=Math.max(2,Math.round(winW/4));
      const mx0=Math.round(cw*0.04), my0=Math.round(ch*0.04);
      let best=-1,bx=mx0,by=my0;
      for(let y=my0;y<=ch-winH-my0;y+=step)for(let xx=mx0;xx<=cw-winW-mx0;xx+=step){
        let s=0,bright=0,n=0;
        for(let yy=y;yy<y+winH;yy+=2)for(let zz=xx;zz<xx+winW;zz+=2){const i=yy*cw+zz;s+=grad[i]*(gray[i]>thr?1:0.15);bright+=gray[i];n++;}
        if(bright/n<mean*0.55)continue;
        if(s>best){best=s;bx=xx;by=y;}
      }
      if(best<=0) return null;
      let fx=bx/cw, fy=by/ch, fw=winW/cw, fh=winH/ch;
      const ex=fw*0.12, ey=fh*0.12;
      fx=Math.max(0,fx-ex);fy=Math.max(0,fy-ey);fw=Math.min(1-fx,fw+2*ex);fh=Math.min(1-fy,fh+2*ey);
      return {fx,fy,fw,fh};
    }catch(e){return null;}
  }
  function fracToStage(f){
    const sw=stage.clientWidth, sh=stage.clientHeight, ar=imgNW/imgNH;
    let dw,dh; if(sw/sh>ar){dh=sh;dw=sh*ar;}else{dw=sw;dh=sw/ar;}
    const ox=(sw-dw)/2, oy=(sh-dh)/2;
    return {x:(ox+f.fx*dw)/sw*100, y:(oy+f.fy*dh)/sh*100, w:f.fw*dw/sw*100, h:f.fh*dh/sh*100};
  }

  /* ---------------- manual draw (optional fine-tune) ---------------- */
  function evtPct(e){const r=stage.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left, cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    return {x:Math.max(0,Math.min(100,cx/r.width*100)), y:Math.max(0,Math.min(100,cy/r.height*100))};}
  stage.addEventListener('pointerdown',e=>{
    if(!hasImg||scanning)return;
    drawing=true;drawStart=evtPct(e);
    region.classList.remove('focus','locked');
    $('#rlabel').classList.add('hidden');$('#rconf').classList.add('hidden');
    region.classList.add('show');stage.setPointerCapture(e.pointerId);hideHint();
  });
  stage.addEventListener('pointermove',e=>{if(!drawing)return;const p=evtPct(e);
    roi={x:Math.min(drawStart.x,p.x),y:Math.min(drawStart.y,p.y),w:Math.abs(p.x-drawStart.x),h:Math.abs(p.y-drawStart.y)};place();});
  stage.addEventListener('pointerup',()=>{
    if(!drawing)return;drawing=false;
    if(!roi||roi.w<3||roi.h<3){roi=null;region.classList.remove('show');showHint('hint_small');return;}
    centerBlob();
    runScan(false);   // analyze the manually adjusted box
  });
  function place(){region.style.left=roi.x+'%';region.style.top=roi.y+'%';region.style.width=roi.w+'%';region.style.height=roi.h+'%';
    $('#hudRoi').textContent=`x${Math.round(roi.x)} y${Math.round(roi.y)} · ${Math.round(roi.w)}×${Math.round(roi.h)} %`;}
  function centerBlob(){const cb=$('#camBlob');
    cb.setAttribute('cx',(roi.x+roi.w/2)/100*600);cb.setAttribute('cy',(roi.y+roi.h/2)/100*800);
    cb.setAttribute('rx',Math.max(45,roi.w/100*600*0.6));cb.setAttribute('ry',Math.max(40,roi.h/100*800*0.6));}

  /* ---------------- status / hint ---------------- */
  function setStatusKey(k,busy){statusKey=k;statusBusy=busy;$('#statusTxt').textContent=tr(k);
    const d=$('#statusDot');d.className='dot'+(busy?' busy':(hasImg?'':' idle'));}
  let hintT;
  function showHint(k){const h=$('#hint');clearTimeout(hintT);h.textContent=tr(k);h.classList.add('show');hintT=setTimeout(()=>h.classList.remove('show'),3400);}
  function hideHint(){clearTimeout(hintT);$('#hint').classList.remove('show');}

  /* ---------------- scan flow ---------------- */
  $('#scanBtn').onclick=()=>runScan(true);
  function runScan(detect){
    if(!hasImg||scanning)return;
    scanning=true;
    stage.classList.add('scanning');
    region.classList.remove('locked');
    $('#rlabel').classList.add('hidden');$('#rconf').classList.add('hidden');
    $('#results').classList.remove('show');
    $('#scanBtn').disabled=true;$('#scanLbl').textContent=tr('btn_working');
    setStatusKey('pill_detecting',true);
    showHint('hint_detecting');

    setTimeout(()=>{
      if(detect){
        const f = isDemo?DEMO_FRAC:autoDetect();
        if(!f){ // fallback
          if(isDemo){roi=fracToStage(DEMO_FRAC);} else {roi=fracToStage({fx:0.34,fy:0.36,fw:0.3,fh:0.28}); showHint('hint_fail');}
        } else { roi=fracToStage(f); }
        place();centerBlob();
        $('#hud').classList.remove('hidden');
      }
      region.classList.add('show','focus');
      setStatusKey('pill_analyzing',true);
      setTimeout(()=>{
        stage.classList.remove('scanning');
        scanning=false;
        showResults();
        $('#scanBtn').disabled=false;$('#scanLbl').textContent=tr('btn_redetect');
        setStatusKey('pill_done',false);$('#statusDot').className='dot';
      },1000);
    }, detect?1300:600);
  }

  function genResult(){
    if(isDemo) return {key:'transverse',conf:94.2,probs:[['transverse',94.2],['oblique',3.1],['comminuted',1.4],['greenstick',1.3]]};
    const keys=Object.keys(CLS), k=keys[Math.floor(Math.random()*keys.length)];
    let conf=72+Math.random()*24;
    const others=keys.filter(x=>x!==k).sort(()=>Math.random()-.5).slice(0,3);
    let rem=100-conf, probs=[[k,conf]];
    others.forEach((o,i)=>{const v=i===others.length-1?rem:rem*(0.4+Math.random()*0.3);rem-=v;probs.push([o,v]);});
    return {key:k,conf:+conf.toFixed(1),probs:probs.map(([a,b])=>[a,+b.toFixed(1)])};
  }
  function showResults(){lastResult=genResult();analyzed=true;region.classList.add('show','focus','locked');renderResults();
    $('#results').classList.add('show');$('#reportTs').textContent=new Date().toLocaleString(lang==='zh'?'zh-CN':lang==='ko'?'ko-KR':'en-US',{hour12:false}).replace(/\//g,'-');
    $('#results').scrollIntoView({behavior:'smooth',block:'start'});}

  function renderResults(){
    if(!lastResult)return;const r=lastResult, C=CLS[r.key], sevKey=C.sev, S=SEVC[sevKey];
    $('#rlabel').classList.remove('hidden');$('#rconf').classList.remove('hidden');
    $('#rlabel').textContent=C[lang];$('#rconf').textContent=r.conf+'%';
    $('#clsName').textContent=C[lang];$('#clsName').style.color=S.c;$('#clsEn').textContent=C.en;
    const arc=$('#ringArc');arc.style.stroke=S.c;arc.style.strokeDashoffset=320*(1-r.conf/100);
    $('#confBig').textContent=r.conf.toFixed(1)+'%';
    const sb=$('#sevBadge');sb.style.color=S.c;sb.style.borderColor=S.bd;sb.style.background=S.bg;
    sb.querySelector('.d').style.background=S.c;$('#sevTxt').textContent=SEVT[sevKey][lang];
    const pl=$('#probList');pl.innerHTML='';
    r.probs.forEach((p,i)=>{const d=document.createElement('div');d.className='prob'+(i===0?' lead':'');
      d.innerHTML=`<div class="prob-top"><span class="nm">${CLS[p[0]][lang]}</span><span class="pc">${p[1].toFixed(1)}%</span></div><div class="bar"><i style="width:${p[1]}%"></i></div>`;
      pl.appendChild(d);});
    $('#mCoord').innerHTML=roi?`x ${Math.round(roi.x)} · y ${Math.round(roi.y)} <small>%</small>`:'—';
    $('#mSize').innerHTML=roi?`${Math.round(roi.w)} × ${Math.round(roi.h)} <small>%</small>`:'—';
    $('#mShape').textContent= mode==='box'?tr('shape_rect'):tr('shape_circle');
    $('#mRange').textContent=tr('m_range_val');
    $('#findingTxt').innerHTML=FIND[r.key][lang];
    const rl=$('#recoList');rl.innerHTML='';
    RECO[sevKey][lang].forEach(t=>{const li=document.createElement('li');li.textContent=t;rl.appendChild(li);});
  }

  /* ---------------- report ---------------- */
  $('#reportBtn').onclick=()=>{
    if(!analyzed)return;const r=lastResult,C=CLS[r.key],sevKey=C.sev;
    const w=window.open('','_blank');
    const rows=r.probs.map(p=>`<tr><td>${CLS[p[0]][lang]}</td><td>${CLS[p[0]].en}</td><td style="text-align:right">${p[1].toFixed(1)}%</td></tr>`).join('');
    w.document.write(`<!doctype html><meta charset="utf-8"><title>OssiScan</title>
      <style>body{font-family:'Inter','Noto Sans KR',system-ui,sans-serif;max-width:760px;margin:40px auto;color:#1a2430;padding:0 24px}
      h1{font-size:22px;border-bottom:3px solid #e11d2a;padding-bottom:10px}.meta{color:#647;font-size:13px;margin:4px 0 24px;font-family:monospace}
      .v{background:#fff5f5;border:1px solid #f3c2c6;border-radius:10px;padding:16px 18px;margin:18px 0}.v b{font-size:20px}
      .tag{display:inline-block;background:#e11d2a;color:#fff;padding:2px 10px;border-radius:6px;font-size:12px}
      table{width:100%;border-collapse:collapse;margin:10px 0}td{padding:7px 4px;border-bottom:1px solid #e6edf2;font-size:13px}
      h3{font-size:13px;letter-spacing:1px;color:#778;text-transform:uppercase;margin-top:26px}
      .note{font-size:11px;color:#8895a3;border-left:3px solid #fbbf24;padding:10px 12px;background:#fffdf5;margin-top:24px}@media print{button{display:none}}</style>
      <h1>OssiScan · ${tr('rep_title')}</h1>
      <div class="meta">${new Date().toLocaleString()} · ${tr('rep_scope')}</div>
      <div class="v"><span class="tag">${tr('rep_dx')}</span><br><br><b>${C[lang]}</b>（${C.en}）<br>${tr('rep_conf')} ${r.conf}%<br>
      ROI: x${Math.round(roi.x)} y${Math.round(roi.y)} · ${Math.round(roi.w)}×${Math.round(roi.h)} % (${mode==='box'?tr('shape_rect'):tr('shape_circle')})</div>
      <h3>${tr('rep_prob')}</h3><table>${rows}</table>
      <h3>${tr('rep_find')}</h3><p style="font-size:14px;line-height:1.7">${FIND[r.key][lang].replace(/<\/?b>/g,'')}</p>
      <h3>${tr('rep_reco')}</h3><ul style="font-size:14px;line-height:1.8">${RECO[sevKey][lang].map(t=>'<li>'+t+'</li>').join('')}</ul>
      <p class="note">${tr('rep_note')}</p>
      <button onclick="print()" style="margin-top:20px;padding:10px 20px;background:#e11d2a;color:#fff;border:0;border-radius:8px;cursor:pointer">${tr('rep_print')}</button>`);
    w.document.close();
  };

  /* ---------------- reset ---------------- */
  $('#clearBtn').onclick=()=>{
    img.innerHTML='';img.classList.add('empty');drop.classList.remove('hide');
    br.value=100;ct.value=110;applyImg();
    hasImg=false;isDemo=false;roi=null;scanning=false;
    region.classList.remove('show','focus','locked');stage.classList.remove('scanning');
    heat=false;$('#heatBtn').classList.remove('on');$('#heatBtn').disabled=true;$('#heatLayer').classList.remove('show');
    $('#hud').classList.add('hidden');resetAnalysis(false);
    setStatusKey('pill_wait',false);$('#statusDot').className='dot idle';hideHint();
  };
  function resetAnalysis(keepImg){
    analyzed=false;lastResult=null;
    $('#results').classList.remove('show');$('#reportTs').textContent='—';
    $('#scanBtn').disabled=!keepImg;$('#scanLbl').textContent=tr('btn_auto');
    $('#heatBtn').disabled=!keepImg;region.classList.remove('focus','locked');
    if(!keepImg)region.classList.remove('show');
  }

  /* ---------------- demo synthetic X-ray ---------------- */
  const DEMO_SVG=`<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg"><defs>
    <radialGradient id="ti" cx="50%" cy="45%" r="65%"><stop offset="0%" stop-color="#2c3138"/><stop offset="70%" stop-color="#15181d"/><stop offset="100%" stop-color="#070809"/></radialGradient>
    <linearGradient id="cr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3a4047"/><stop offset="18%" stop-color="#e8ecf0"/><stop offset="35%" stop-color="#8a9098"/><stop offset="65%" stop-color="#8a9098"/><stop offset="82%" stop-color="#e8ecf0"/><stop offset="100%" stop-color="#3a4047"/></linearGradient>
    <linearGradient id="cu" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#33383f"/><stop offset="20%" stop-color="#d6dbe1"/><stop offset="40%" stop-color="#777d85"/><stop offset="60%" stop-color="#777d85"/><stop offset="80%" stop-color="#d6dbe1"/><stop offset="100%" stop-color="#33383f"/></linearGradient>
    <filter id="sf"><feGaussianBlur stdDeviation="1.1"/></filter></defs>
    <rect width="600" height="800" fill="#040506"/>
    <path d="M210 40 Q150 250 170 470 Q180 660 230 770 L390 770 Q445 640 440 460 Q450 250 405 40 Z" fill="url(#ti)" filter="url(#sf)"/>
    <path d="M360 70 Q380 260 372 470 Q368 640 352 760 L322 760 Q312 620 318 460 Q322 250 318 80 Z" fill="url(#cu)" filter="url(#sf)"/>
    <path d="M340 95 Q352 300 346 470 Q344 600 338 740" stroke="#1c2025" stroke-width="9" fill="none" opacity=".7"/>
    <path d="M235 80 Q210 250 218 430 L218 470 L222 560 Q230 660 252 762 L292 762 Q300 640 296 540 L296 470 L290 430 Q282 250 282 90 Z" fill="url(#cr)" filter="url(#sf)"/>
    <path d="M250 110 Q236 300 244 430 M252 545 Q258 650 268 740" stroke="#1b1f24" stroke-width="11" fill="none" opacity=".75"/>
    <path d="M214 472 L296 466" stroke="#050607" stroke-width="6"/><path d="M216 478 Q255 470 294 474" stroke="#0a0c0e" stroke-width="3" opacity=".9"/>
    <path d="M212 470 l10 -7 m24 8 l8 -5 m22 6 l9 -6" stroke="#040506" stroke-width="3" opacity=".8"/>
    <ellipse cx="300" cy="58" rx="120" ry="30" fill="#5a6068" opacity=".5" filter="url(#sf)"/>
    <ellipse cx="300" cy="772" rx="110" ry="26" fill="#4a5057" opacity=".5" filter="url(#sf)"/></svg>`;

  /* ---------------- init ---------------- */
  applyImg();applyLang();
})();
</script>
</body>
